<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso — Scuffers OPS Brain</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0e1117; color:#f1f5f9;
  font-family:'Inter',system-ui,sans-serif;
  display:flex; align-items:center; justify-content:center;
  height:100vh; flex-direction:column; gap:24px;
  -webkit-app-region:drag;
}
img { width:110px; filter:brightness(0) invert(1); opacity:0.9; }
.box {
  background:#161b27; border:1px solid #1e293b; border-radius:12px;
  padding:32px 36px; width:340px;
  -webkit-app-region:no-drag;
}
.title { font-size:11px; font-weight:700; letter-spacing:0.12em; color:#64748b; margin-bottom:24px; text-align:center; }
input {
  width:100%; padding:11px 14px; background:#0e1117; border:1px solid #1e293b;
  border-radius:7px; color:#f1f5f9; font-size:13px; font-family:inherit;
  margin-bottom:12px; outline:none; transition:border-color .15s;
}
input:focus { border-color:#059669; }
button {
  width:100%; padding:12px; background:#059669; border:none; border-radius:7px;
  color:#fff; font-size:12px; font-weight:700; letter-spacing:0.1em;
  cursor:pointer; font-family:inherit; margin-top:4px; transition:background .15s;
}
button:hover:not(:disabled) { background:#34d399; }
button:disabled { opacity:0.5; cursor:default; }
.error { font-size:12px; color:#f87171; margin-top:12px; text-align:center; min-height:18px; }
</style>
</head>
<body>
  <img src="assets/icon.png" alt="Scuffers">
  <div class="box">
    <div class="title">OPS BRAIN — ACCESO RESTRINGIDO</div>
    <input id="user" type="text" placeholder="Usuario" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('pass').focus()">
    <input id="pass" type="password" placeholder="Contraseña" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')login()">
    <button id="btn" onclick="login()">ENTRAR →</button>
    <div class="error" id="err"></div>
  </div>

<script>
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const USERS = {
  'admin':    { hash: '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918', role: 'admin' },
  'empleado': { hash: '0baff97ff722b0be472c1ff5a1edabf7cefb089d0575794975c3007989327efa', role: 'empleado' },
};

async function login() {
  const username = document.getElementById('user').value.trim().toLowerCase();
  const password = document.getElementById('pass').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  if (!username || !password) { err.textContent = 'Introduce usuario y contraseña.'; return; }

  btn.disabled = true; btn.textContent = 'VERIFICANDO...'; err.textContent = '';

  const hash = await sha256(password);
  const record = USERS[username];

  if (!record || record.hash !== hash) {
    err.textContent = 'Usuario o contraseña incorrectos.';
    btn.disabled = false; btn.textContent = 'ENTRAR →';
    return;
  }

  window.loginBridge.success(username, record.role);
}

document.getElementById('user').focus();
</script>
</body>
</html>
