<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 420px; height: 260px;
    background: transparent;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden; user-select: none;
  }
  .card {
    width: 100%; height: 100%;
    background: #161b27;
    border: 1px solid #2a3348;
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
  }
  img { width: 110px; filter: brightness(0) invert(1); opacity: 0.92; }
  .bar-wrap { width: 220px; height: 2px; background: #2a3348; border-radius: 2px; overflow: hidden; }
  .bar {
    height: 100%; width: 0%;
    background: #34d399; border-radius: 2px;
    animation: load 1.8s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes load {
    0%   { width: 0%; }
    30%  { width: 45%; }
    60%  { width: 72%; }
    85%  { width: 88%; }
    100% { width: 100%; }
  }
  .label {
    font-size: 10px; letter-spacing: 0.18em;
    color: #94a3b8; text-transform: uppercase;
  }
  .version { font-size: 9px; color: #4a5568; letter-spacing: 0.1em; margin-top: -16px; }
</style>
</head>
<body>
<div class="card">
  <img src="https://scuffers.com/cdn/shop/files/Logo_Scuffers_Blanco_500x.png" alt="Scuffers">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="bar-wrap"><div class="bar"></div></div>
    <div class="label">Iniciando OPS Brain...</div>
  </div>
  <div class="version">v1.0.0</div>
</div>
</body>
</html>
